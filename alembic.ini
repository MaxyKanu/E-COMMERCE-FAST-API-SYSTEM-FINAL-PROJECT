# Alembic configuration file
# Alembic tracks schema versions like Git tracks code changes

[alembic]
# Path to migration scripts
script_location = alembic

# SQLAlchemy URL (will be overridden by env.py with settings from .env)
sqlalchemy.url = postgresql://postgres:password@localhost/ecommerce_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S